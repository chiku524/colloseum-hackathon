# Deploy apps/web to Vercel production when main updates.
# Requires repository secret: VERCEL_TOKEN_HACKATHON (Vercel account token with deploy access).
# Project link: .vercel/project.json at repo root. Vercel dashboard Root Directory must stay "apps/web";
# do not pass --cwd apps/web here or the path is doubled (apps/web/apps/web).

name: Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_HACKATHON }}
        run: npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
