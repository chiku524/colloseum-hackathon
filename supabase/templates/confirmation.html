<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm your email</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 24px;
      font-family: system-ui, Segoe UI, sans-serif;
      line-height: 1.5;
      color: #0c1018;
      background: #f4f6f9;
    "
  >
    <div style="max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px 24px; box-shadow: 0 8px 24px rgba(12, 16, 24, 0.08);">
      <h1 style="margin: 0 0 8px; font-size: 1.35rem; letter-spacing: -0.02em;">web3stronghold</h1>
      <p style="margin: 0 0 16px; color: #3d4f63;">Confirm your email address to finish signing up.</p>
      <p style="margin: 0 0 20px;">
        <a
          href="{{ .ConfirmationURL }}"
          style="
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(135deg, #3d7fd4, #2d6bb8);
            color: #fff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
          "
          >Confirm email</a
        >
      </p>
      <p style="margin: 0; font-size: 13px; color: #6a7a8c;">
        Or enter this code:
        <strong style="letter-spacing: 0.12em;">{{ .Token }}</strong>
      </p>
      <p style="margin: 20px 0 0; font-size: 12px; color: #8b9cb0;">
        If you did not create an account, you can ignore this message.
      </p>
    </div>
  </body>
</html>
